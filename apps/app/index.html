<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Defense-in-depth CSP. No XSS sink exists (React escapes everything), but the
      restricted connect-src/script-src limit where a hypothetical injection could
      load scripts from or exfiltrate tokens to. Allowed hosts = the providers the
      app actually talks to (Twitch IRC/API, Spotify API/embed, YouTube).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' https://www.youtube.com https://s.ytimg.com;
               style-src 'self' 'unsafe-inline';
               img-src 'self' data: https:;
               media-src 'self' https:;
               font-src 'self' data:;
               connect-src 'self' https://api.spotify.com https://accounts.spotify.com https://open.spotify.com https://api.twitch.tv https://id.twitch.tv https://www.youtube.com wss://irc-ws.chat.twitch.tv;
               frame-src https://open.spotify.com https://www.youtube.com https://www.youtube-nocookie.com;
               object-src 'none';
               base-uri 'self';
               form-action 'self';"
    />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <title>Blindtest</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
