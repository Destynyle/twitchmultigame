# Battle room backend — one Durable Object per room.
# Secrets (wrangler secret put …): ROOM_PASSWORD, SPOTIFY_CLIENT_ID,
# SPOTIFY_CLIENT_SECRET, TWITCH_CLIENT_ID (optionnel — login Twitch viewers)
name = "battle-rooms"
main = "src/index.ts"
compatibility_date = "2026-06-01"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "BattleRoom"

[[durable_objects.bindings]]
name = "WEEKLY"
class_name = "WeeklyHub"

# SQLite-backed DO classes — required on the free plan.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["BattleRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["WeeklyHub"]
