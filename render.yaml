services:
  # ── Next.js Web App ──────────────────────────────────────────────────────────
  - type: web
    name: playground-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: playground-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: playground-redis
          type: redis
          property: connectionString
      - key: AUTH_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: TWITCH_CLIENT_ID
        sync: false
      - key: TWITCH_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false

  # ── Bot Worker ───────────────────────────────────────────────────────────────
  - type: web
    name: playground-bot
    runtime: docker
    dockerfilePath: ./apps/bot-worker/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: playground-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: playground-redis
          type: redis
          property: connectionString
      - key: TOKEN_ENCRYPTION_KEY
        sync: false

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: playground-redis
    plan: free
    ipAllowList: []

databases:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  - name: playground-db
    plan: free
    databaseName: playground
    user: playground
